<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POUCHEN QR | Fast URL to QR Code</title>
    <meta name="description" content="Generate high-quality QR codes instantly from any URL with POUCHEN QR Code Generator. Simple, fast, and secure.">
    <script type="module" crossorigin src="/pma-qr-generator/assets/index-CX1zVroD.js"></script>
    <link rel="stylesheet" crossorigin href="/pma-qr-generator/assets/index-B8U0g3Rg.css">
  </head>
    <nav class="white-nav">
      <div class="logo">
        <img src="logo.png" alt="POUCHEN Logo" width="48" height="48" style="border-radius: 8px;">
        <h2>" POUCHEN QR " | Fast URL to QR Code</h2>
      </div>

      <div class="nav-actions">
        <div class="lang-selector">
          <button class="lang-btn">
            <span>🇬🇧 EN</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="lang-dropdown">
            <a href="#" data-lang="en"><span>🇬🇧</span> English</a>
            <a href="#" data-lang="zh"><span>🇨🇳</span> 简体中文</a>
            <a href="#" data-lang="tw"><span>🇹🇼</span> 繁體中文</a>
            <a href="#" data-lang="mm"><span>🇲🇲</span> Myanmar</a>
            <a href="#" data-lang="vn"><span>🇻🇳</span> Tiếng Việt</a>
            <a href="#" data-lang="id"><span>🇮🇩</span> Indonesia</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="app-main">
      <section class="content-section">
        <div class="hero">
          <h1>From URL to <br>QR Code, <span style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">instantly.</span></h1>
        </div>

        <div class="generator-ui">
          <div class="template-section">
            <label class="input-label">Select Frame Template</label>
            <div id="template-gallery" class="template-gallery">
              <!-- Templates will be injected here -->
            </div>
          </div>

          <div id="custom-text-section" class="input-container hidden">
            <label class="input-label" for="frame-text-input">Frame Customization</label>
            <div class="input-wrapper">
              <input type="text" id="frame-text-input" placeholder="Enter text for the frame..." maxlength="40">
              <input type="color" id="frame-color-picker" title="Change Frame Color">
            </div>
          </div>

          <div class="input-container">
            <label class="input-label" for="url-input">Enter Target URL</label>
            <div class="input-wrapper">
              <input type="url" id="url-input" placeholder="https://example.com" autocomplete="off">
              <button id="generate-btn" class="btn-generate">
                <span class="btn-text">Generate Now</span>
                <div class="loading-spinner"></div>
              </button>
            </div>
          </div>
        </div>

        <footer class="sticky-footer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          2026 POUCHEN Vibe Coding Tools . PMA
        </footer>
      </section>

      <aside class="preview-section">
        <div id="preview-card" class="preview-card">
          <div id="placeholder" class="preview-placeholder">
            <svg width="84" height="84" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>Your QR code will appear here</p>
          </div>

          <div id="qr-result-body" class="hidden" style="text-align: center; width: 100%;">
            <canvas id="qrcode-canvas"></canvas>
            
            <div class="result-actions" style="margin-top: 2rem;">
              <button id="download-btn" class="btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download PNG
              </button>
              <button id="copy-btn" class="btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy Link
              </button>
            </div>
          </div>
        </div>
      </aside>
    </div>

  </body>
</html>
