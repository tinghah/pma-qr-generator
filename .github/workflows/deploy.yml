name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Using 20 (LTS) is often more stable than 22 for CI
          cache: 'npm'     # Change to 'yarn' if you definitely use yarn.lock

      - name: Install and Build 🔧
        run: |
          npm install      # Standardize to npm to avoid the "Exit handler" bug
          npm run build

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # This ensures the .nojekyll file is added so Vite assets work
          enable_jekyll: false
